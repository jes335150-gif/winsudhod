<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINSUDHOD - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Kanit', sans-serif; padding-bottom: 50px; }
        .navbar { background: #111; border-bottom: 3px solid #ff6600; padding: 1.2rem; text-align: center; position: sticky; top: 0; z-index: 50; }
        .logo { color: #ff6600; font-weight: 800; font-size: 2rem; letter-spacing: 3px; }
        .input-box { max-width: 1000px; margin: 1.5rem auto; padding: 1rem; background: #111; border-radius: 12px; border: 1px solid #333; }
        .textarea { width: 100%; height: 70px; padding: 0.8rem; background: #1a1a1a; border: 2px solid #333; color: #ff6600; border-radius: 8px; font-size: 1.8rem; text-align: center; font-weight: bold; overflow: hidden; resize: none; white-space: nowrap; }
        .textarea:focus { outline: none; border-color: #ff6600; box-shadow: 0 0 15px rgba(255, 102, 0, 0.3); }
        .btn-main { font-weight: 700; padding: 0.8rem; border-radius: 8px; transition: 0.2s; width: 100%; cursor: pointer; border: none; }
        .btn-calc { background: #ff6600; color: #000; font-size: 1.2rem; }
        .btn-reset { background: #222; color: #888; border: 1px solid #333; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        .summary-box { background: #0a0a0a; border: 2px solid #ff6600; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
        .header-title { color: #ff6600; font-weight: 700; font-size: 1.2rem; margin-bottom: 0.5rem; text-align: center; }
        .copy-button { background: #ff6600; color: #000; font-weight: 700; padding: 0.4rem; border-radius: 6px; margin-bottom: 1rem; width: 100%; cursor: pointer; }
        .num-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .num-item { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 3px 8px; border-radius: 4px; font-size: 0.95rem; }
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 200px; background-color: #fff; color: #000; text-align: center; border-radius: 12px; padding: 20px; position: fixed; z-index: 9999; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.8); font-weight: 700; font-size: 1.2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.5); opacity: 0; transition: all 0.3s ease; }
        #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="duckSound" preload="auto"><source src="https://www.myinstants.com/media/sounds/duck-toy-sound.mp3" type="audio/mpeg"></audio>
    <audio id="ahhSound" preload="auto"><source src="https://www.myinstants.com/media/sounds/anime-ahh.mp3" type="audio/mpeg"></audio>

    <div id="toast">คัดลอกเรียบร้อย! ✅</div>

    <nav class="navbar">
        <div class="flex items-center justify-center gap-3">
            <div class="bg-orange-600 p-2 rounded-lg rotate-12">
                <i class="fa-solid fa-fire-flame-curved text-black text-2xl"></i>
            </div>
            <span class="logo tracking-tighter">WIN<span class="text-white">SUD</span>HOD</span>
        </div>
    </nav>
    
    <div class="container mx-auto px-4">
        <div class="input-box">
            <textarea id="numInput" placeholder="ใส่ตัวเลขที่ต้องการวิน" class="textarea mb-3" 
                      oninput="this.value = this.value.replace(/[^0-9]/g, '')" 
                      onkeydown="if(event.key === 'Enter') { event.preventDefault(); doCalc(); }"></textarea>
            <div class="flex gap-3">
                <button onclick="doReset()" class="btn-main btn-reset">ล้างข้อมูล</button>
                <button onclick="doCalc()" class="btn-main btn-calc">วินเลขสุดโหด</button>
            </div>
        </div>

        <div id="results" class="main-grid hidden">
            <div class="col-1">
                <div class="summary-box"><h3 class="header-title">2 ตัวปกติ</h3><button class="copy-button" onclick="copy('res2')">คัดลอก</button><div id="res2" class="num-container"></div></div>
                <div class="summary-box"><h3 class="header-title">2 ตัวรวมเบิ้ล</h3><button class="copy-button" onclick="copy('res2b')">คัดลอก</button><div id="res2b" class="num-container"></div></div>
            </div>
            <div class="col-2">
                <div class="summary-box"><h3 class="header-title">3 ตัวปกติ</h3><button class="copy-button" onclick="copy('res3')">คัดลอก</button><div id="res3" class="num-container"></div></div>
                <div class="summary-box"><h3 class="header-title">3 ตัวปกติรวมตอง</h3><button class="copy-button" onclick="copy('res3pt')">คัดลอก</button><div id="res3pt" class="num-container"></div></div>
            </div>
            <div class="col-3">
                <div class="summary-box"><h3 class="header-title">3 ตัวรวมหาม</h3><button class="copy-button" onclick="copy('res3h')">คัดลอก</button><div id="res3h" class="num-container"></div></div>
                <div class="summary-box"><h3 class="header-title">3 ตัวรวมหามตอง</h3><button class="copy-button" onclick="copy('res3th')">คัดลอกชุดใหญ่</button><div id="res3th" class="num-container"></div></div>
            </div>
        </div>
    </div>

    <script>
        let audioInited = false;

        // ฟังก์ชันเปิดระบบเสียงและตั้งค่าระดับเสียง (Volume)
        function initAudio() { 
            if(!audioInited){ 
                const duck = document.getElementById('duckSound');
                const ahh = document.getElementById('ahhSound');
                
                duck.load();
                ahh.load();
                
                // --- ปรับลดระดับเสียงที่นี่ (0.0 ถึง 1.0) ---
                duck.volume = 0.1; // เสียงเป็ดเบาลงเหลือ 30%
                ahh.volume = 0.1;  // เสียง Ahh เบาลงเหลือ 20%
                
                audioInited = true; 
            } 
        }

        function playSound(id) {
            const s = document.getElementById(id);
            if (s) {
                s.currentTime = 0; 
                s.play().catch(e => console.log("Audio block:", e));
            }
        }

        function doCalc() {
            const inputEl = document.getElementById('numInput');
            const val = inputEl.value;
            if (val.length < 2) return;
            
            playSound('duckSound');

            const d = [...new Set(val.split(''))];
            let r2=[], r2b=[], r3=[], r3pt=[], r3h=[], r3th=[];

            for(let i=0; i<d.length; i++){
                for(let j=i+1; j<d.length; j++) r2.push(d[i]+d[j]);
            }
            r2b = [...r2]; d.forEach(x => r2b.push(x+x));

            for(let i=0; i<d.length; i++){
                for(let j=i+1; j<d.length; j++){
                    for(let k=j+1; k<d.length; k++) r3.push(d[i]+d[j]+d[k]);
                }
            }
            r3pt = [...r3]; d.forEach(x => r3pt.push(x+x+x));

            for (let i = 0; i < d.length; i++) {
                for (let j = i + 1; j < d.length; j++) r3h.push(d[i] + d[i] + d[j]);
                for (let j = i + 1; j < d.length; j++) {
                    r3h.push(d[i] + d[j] + d[j]);
                    for (let k = j + 1; k < d.length; k++) r3h.push(d[i] + d[j] + d[k]);
                }
            }
            r3th = [...r3h]; d.forEach(x => r3th.push(x+x+x));

            render('res2', r2); render('res2b', r2b);
            render('res3', r3); render('res3pt', r3pt);
            render('res3h', r3h); render('res3th', r3th);
            
            document.getElementById('results').classList.remove('hidden');
            inputEl.focus();
            inputEl.select();
        }

        function render(id, arr) {
            document.getElementById(id).innerHTML = arr.map(n => `<span class="num-item">${n}</span>`).join('');
        }

        function copy(id) {
            const items = Array.from(document.getElementById(id).querySelectorAll('.num-item'));
            const t = items.map(el => el.innerText).join('-');
            if (!t) return;
            navigator.clipboard.writeText(t).then(() => {
                playSound('ahhSound'); 
                const toast = document.getElementById("toast");
                toast.classList.add("show");
                setTimeout(() => { toast.classList.remove("show"); }, 1200);
            });
        }

        function doReset() {
            document.getElementById('numInput').value = '';
            document.getElementById('results').classList.add('hidden');
        }
    </script>
</body>
</html>
